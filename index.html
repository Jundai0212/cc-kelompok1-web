<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projek Cloud Computing - Kelompok 1</title>

<style>
*{ margin:0; padding:0; box-sizing:border-box; }
body{
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background: linear-gradient(135deg, #0066ff, #0099ff, #00bfff);
}
body::before{
    content:""; position:absolute; width:200%; height:200%;
    background: radial-gradient(circle at center, rgba(255,255,255,0.15) 1px, transparent 1px);
    background-size:25px 25px; animation: moveBg 30s linear infinite;
}
@keyframes moveBg{ from{ transform:translate(0,0); } to{ transform:translate(-100px,-100px); } }
.wave{ position:absolute; bottom:0; left:0; width:100%; height:250px; background:rgba(255,255,255,0.08); border-radius:100% 100% 0 0; filter:blur(40px); }
.container{ position:relative; z-index:2; width:90%; max-width:500px; padding:45px; background:rgba(255,255,255,0.15); backdrop-filter:blur(15px); border:1px solid rgba(255,255,255,0.2); border-radius:25px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); text-align:center; color:white; }
h1{ font-size:2rem; margin-bottom:20px; }
hr{ margin:20px 0; border:none; height:1px; background:rgba(255,255,255,0.3); }

/* Style Form Input Baru */
.form-group { margin-bottom: 15px; text-align: left; }
.form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; }
.form-group input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.2); color: white; font-size: 1rem; outline: none; }
.form-group input::placeholder { color: rgba(255,255,255,0.7); }
.form-group input:focus { background: rgba(255,255,255,0.3); border-color: white; }

.btn{ display:block; width:100%; margin-top:20px; padding:12px; border-radius:30px; border:none; text-decoration:none; color:#0078D4; background:white; font-weight:bold; font-size:1rem; cursor:pointer; transition:0.3s; }
.btn:hover{ transform:scale(1.02); box-shadow:0 5px 20px rgba(255,255,255,0.4); }
#error-msg { color: #ffbcbc; margin-top: 10px; font-size: 0.9rem; display: none; }
</style>
</head>
<body>

<div class="wave"></div>

<div class="container">
    <h1>Login Kelompok 1</h1>
    <p>Silakan masukkan akun Anda untuk mengakses dashboard.</p>
    <hr>

    <form id="loginForm">
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Masukkan username..." required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Masukkan password..." required>
        </div>
        
        <p id="error-msg">Username atau Password salah!</p>
        
        <button type="submit" class="btn">Masuk ke Dashboard</button>
    </form>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Mencegah reload halaman
        
        const userInput = document.getElementById('username').value;
        const passInput = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-msg');

        // AKUN LOG-IN SIMULASI (Bisa kamu ganti sesuka hati)
        // Username: admin  | Password: kelompok123
        if (userInput === "admin" && passInput === "kelompok123") {
            // Simpan nama user sementara di memori browser
            localStorage.setItem("session_user", userInput);
            // Lempar ke halaman dashboard
            window.location.href = "dashboard.html";
        } else {
            errorMsg.style.display = "block"; // Munculkan teks error jika salah
        }
    });
</script>

</body>
</html>
