<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Internal</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f6f9; }
        .card { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .btn-logout { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #ce3c3c; color: white; text-decoration: none; border-radius: 5px; border: none; cursor: pointer; font-size: 1rem;}
    </style>
</head>
<body>

<div class="card">
    <h1 style="color: green;">Akses Diterima!</h1>
    <h2>Halo, <span id="namaUser">User</span>!</h2>
    <p>Anda berhasil masuk menggunakan sistem Custom Authentication Kelompok 1.</p>
    
    <button onclick="logout()" class="btn-logout">Logout</button>
</div>

<script>
    // Kunci Halaman: Cek apakah user sudah login di halaman index tadi?
    const userAktif = localStorage.getItem("session_user");

    if (!userAktif) {
        // Jika belum login tapi nekat buka tautan ini, tendang balik ke halaman login
        alert("Akses ditolak! Silakan login terlebih dahulu.");
        window.location.href = "index.html";
    } else {
        // Jika sudah login, tampilkan namanya di layar
        document.getElementById('namaUser').innerText = userAktif;
    }

    // Fungsi menghapus sesi saat tombol logout ditekan
    function logout() {
        localStorage.removeItem("session_user");
        window.location.href = "index.html";
    }
</script>

</body>
</html>
