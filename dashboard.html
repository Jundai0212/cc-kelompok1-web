<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Internal</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f6f9; }
        .card { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-logout { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #ce3c3c; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h1 style="color: green;">Akses Diterima!</h1>
    
    <h2>Halo, <span id="username">Memuat nama...</span>!</h2>
    <p>Kamu berhasil login ke sistem internal Kelompok 1 menggunakan akun ID: <strong id="user-id">-</strong></p>
    
    <a href="/.auth/logout" class="btn-logout">Logout</a>
</div>

<script>
    // Fungsi otomatis untuk mengambil data siapa yang sedang login dari Azure
    async function getUserInfo() {
        const response = await fetch('/.auth/me');
        const payload = await response.json();
        const { clientPrincipal } = payload;

        if (clientPrincipal) {
            // clientPrincipal.userDetails isinya adalah Username GitHub mereka
            document.getElementById('username').innerText = clientPrincipal.userDetails;
            document.getElementById('user-id').innerText = clientPrincipal.userId;
        } else {
            document.getElementById('username').innerText = "Tamu";
        }
    }

    // Jalankan fungsi saat halaman dibuka
    getUserInfo();
</script>

</body>
</html>
